<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Belvedere Viewers</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f4f4f0;
            color: #222;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 2rem;
            color: #555;
        }

        .viewers {
            display: flex;
            gap: 1.5rem;
        }

        a {
            display: block;
            padding: 1.2rem 2rem;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-decoration: none;
            color: #222;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0, 0, 0, .06);
            transition: box-shadow .2s;
        }

        a:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, .12);
        }
    </style>
</head>

<body>
    <h1>Belvedere Glacier — Viewers (dev)</h1>
    <div class="viewers">
        <a href="/potree/">🗻 Potree 3D</a>
        <a href="/web-map/">🗺️ Web Map</a>
    </div>
</body>

</html>
