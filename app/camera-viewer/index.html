<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belvedere Camera Viewer</title>

  <!-- noUiSlider -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }

    #topbar h1 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #aaa;
      white-space: nowrap;
    }

    select,
    button {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    select:focus,
    button:focus {
      outline: 2px solid #4a9eff;
    }

    button:hover {
      background: #3a3a3a;
    }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #camera-select {
      min-width: 160px;
    }

    #nav-group {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    #date-display {
      font-size: 0.85rem;
      min-width: 180px;
      text-align: center;
      color: #ccc;
    }

    #play-btn {
      min-width: 60px;
    }

    #speed-select {
      padding: 5px 6px;
    }

    #status {
      font-size: 0.75rem;
      color: #888;
      white-space: nowrap;
    }

    /* ── Image area ── */
    #image-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    #main-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    #placeholder {
      color: #555;
      font-size: 1rem;
    }

    #loading-spinner {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    /* ── Bottom controls ── */
    #bottom-bar {
      padding: 12px 20px 16px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }

    #slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    #slider-year-min,
    #slider-year-max {
      font-size: 0.75rem;
      color: #888;
      white-space: nowrap;
    }

    #time-slider {
      flex: 1;
    }

    #date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #date-row label {
      font-size: 0.8rem;
      color: #888;
    }

    #date-picker-input {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.85rem;
      width: 140px;
    }

    /* noUiSlider dark theme overrides */
    .noUi-target {
      background: #333;
      border: none;
      box-shadow: none;
    }

    .noUi-connect {
      background: #4a9eff;
    }

    .noUi-handle {
      background: #4a9eff;
      border: none;
      box-shadow: none;
      border-radius: 50%;
      width: 16px !important;
      height: 16px !important;
      top: -6px !important;
      right: -8px !important;
      cursor: pointer;
    }

    .noUi-handle::before,
    .noUi-handle::after {
      display: none;
    }

    .noUi-tooltip {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      font-size: 0.72rem;
      padding: 2px 5px;
    }
  </style>
</head>

<body>

  <div id="topbar">
    <h1>Belvedere Camera Viewer</h1>

    <select id="camera-select">
      <option value="">— select camera —</option>
    </select>

    <div id="nav-group">
      <button id="prev-btn" disabled>&#8592; Prev</button>
      <span id="date-display">—</span>
      <button id="next-btn" disabled>Next &#8594;</button>
      <button id="play-btn" disabled>&#9654; Play</button>
      <select id="speed-select" title="Playback speed">
        <option value="500">2 fps</option>
        <option value="250">4 fps</option>
        <option value="125" selected>8 fps</option>
        <option value="50">20 fps</option>
      </select>
    </div>

    <span id="status"></span>
  </div>

  <div id="image-area">
    <div id="placeholder">Select a camera to start.</div>
    <div id="loading-spinner"></div>
    <img id="main-image" alt="Camera image">
  </div>

  <div id="bottom-bar">
    <div id="slider-row">
      <span id="slider-year-min"></span>
      <div id="time-slider"></div>
      <span id="slider-year-max"></span>
    </div>
    <div id="date-row">
      <label for="date-picker-input">Jump to date:</label>
      <input id="date-picker-input" type="text" placeholder="YYYY-MM-DD" readonly>
    </div>
  </div>

  <!-- noUiSlider -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
  <!-- Flatpickr -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <!-- This fetches the API base URL from the config.php file -->
  <script src="config.php"></script>

  <script>
    const cameraSelect = document.getElementById("camera-select");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const playBtn = document.getElementById("play-btn");
    const speedSelect = document.getElementById("speed-select");
    const dateDisplay = document.getElementById("date-display");
    const mainImage = document.getElementById("main-image");
    const placeholder = document.getElementById("placeholder");
    const spinner = document.getElementById("loading-spinner");
    const statusEl = document.getElementById("status");
    const sliderYearMin = document.getElementById("slider-year-min");
    const sliderYearMax = document.getElementById("slider-year-max");
    const sliderEl = document.getElementById("time-slider");

    // ── State ────────────────────────────────────────────────────────────────────
    let images = [];   // [{id, datetime, filename, ...}]
    let current = 0;    // index into images
    let playing = false;
    let playTimer = null;
    let sliderInstance = null;
    let sliderUpdating = false;  // prevent feedback loops between slider ↔ index

    // ── Presigned URL cache ───────────────────────────────────────────────────────
    const urlCache = new Map();  // image id → {url, expiresAt}
    const URL_TTL_MS = 50 * 60 * 1000;  // 50 min (presigned URLs valid 1h)

    async function getPreviewUrl(img) {
      const cached = urlCache.get(img.id);
      if (cached && Date.now() < cached.expiresAt) return cached.url;
      const resp = await fetch(`${API_BASE}/cams/images/${img.id}/preview-url/`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const { url } = await resp.json();
      urlCache.set(img.id, { url, expiresAt: Date.now() + URL_TTL_MS });
      return url;
    }

    function prefetchAdjacent(i) {
      if (images[i - 1]) getPreviewUrl(images[i - 1]).catch(() => { });
      if (images[i + 1]) getPreviewUrl(images[i + 1]).catch(() => { });
    }

    // ── Flatpickr ────────────────────────────────────────────────────────────────
    const datePicker = flatpickr("#date-picker-input", {
      dateFormat: "Y-m-d",
      onChange([selectedDate]) {
        if (!images.length) return;
        jumpToDate(selectedDate);
      },
    });

    // ── Helpers ──────────────────────────────────────────────────────────────────

    /** Fetch all pages for an endpoint, following DRF pagination. */
    async function fetchAll(url) {
      const results = [];
      let next = url;
      while (next) {
        const resp = await fetch(next);
        if (!resp.ok) throw new Error(`HTTP ${resp.status} — ${next}`);
        const data = await resp.json();
        // Paginated response has {results, next} — plain list has no .next
        if (Array.isArray(data)) {
          results.push(...data);
          break;
        }
        results.push(...(data.results ?? data));
        next = data.next ?? null;
      }
      return results;
    }

    function setStatus(msg) { statusEl.textContent = msg; }

    function showSpinner(on) {
      spinner.style.display = on ? "block" : "none";
    }

    /** Jump to the image whose datetime is closest to targetDate. */
    function jumpToDate(targetDate) {
      const target = targetDate.getTime();
      let best = 0;
      let bestDiff = Infinity;
      for (let i = 0; i < images.length; i++) {
        const diff = Math.abs(new Date(images[i].datetime).getTime() - target);
        if (diff < bestDiff) { bestDiff = diff; best = i; }
      }
      showImage(best);
    }

    /** Display image at index i. */
    async function showImage(i) {
      if (!images.length) return;
      i = Math.max(0, Math.min(i, images.length - 1));
      current = i;

      const img = images[i];
      const dt = new Date(img.datetime);
      dateDisplay.textContent = dt.toLocaleString("en-GB", {
        year: "numeric", month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit",
      });

      prevBtn.disabled = i === 0;
      nextBtn.disabled = i === images.length - 1;

      // Update slider without triggering its own change handler
      if (sliderInstance) {
        sliderUpdating = true;
        sliderInstance.set(i);
        sliderUpdating = false;
      }

      // Update date picker (suppress its onChange)
      datePicker.setDate(dt, false);

      showSpinner(true);
      mainImage.style.display = "none";
      placeholder.style.display = "none";

      try {
        const url = await getPreviewUrl(img);
        mainImage.onload = () => {
          mainImage.style.display = "block";
          showSpinner(false);
          prefetchAdjacent(i);
        };
        mainImage.onerror = () => {
          placeholder.textContent = "Failed to load image.";
          placeholder.style.display = "block";
          showSpinner(false);
        };
        mainImage.src = url;
      } catch (err) {
        placeholder.textContent = `Failed to load image: ${err.message}`;
        placeholder.style.display = "block";
        showSpinner(false);
      }
    }

    // ── Slider setup ─────────────────────────────────────────────────────────────

    function initSlider(count, minDate, maxDate) {
      if (sliderInstance) { sliderInstance.destroy(); sliderInstance = null; }

      sliderYearMin.textContent = minDate.getFullYear();
      sliderYearMax.textContent = maxDate.getFullYear();

      noUiSlider.create(sliderEl, {
        start: [0],
        range: { min: 0, max: Math.max(1, count - 1) },
        step: 1,
        connect: "lower",
        tooltips: {
          to: (v) => {
            const idx = Math.round(v);
            if (!images[idx]) return "";
            return new Date(images[idx].datetime).toLocaleDateString("en-GB", {
              year: "numeric", month: "short", day: "numeric",
            });
          },
        },
      });

      sliderInstance = sliderEl.noUiSlider;
      sliderInstance.on("update", (values) => {
        if (sliderUpdating) return;
        showImage(Math.round(parseFloat(values[0])));
      });
    }

    // ── Playback ─────────────────────────────────────────────────────────────────

    function stopPlay() {
      clearInterval(playTimer);
      playing = false;
      playBtn.textContent = "▶ Play";
    }

    function startPlay() {
      if (!images.length) return;
      playing = true;
      playBtn.textContent = "⏸ Pause";
      const fps = parseInt(speedSelect.value, 10);
      playTimer = setInterval(() => {
        if (current >= images.length - 1) { stopPlay(); return; }
        showImage(current + 1);
      }, fps);
    }

    playBtn.addEventListener("click", () => playing ? stopPlay() : startPlay());
    prevBtn.addEventListener("click", () => showImage(current - 1));
    nextBtn.addEventListener("click", () => showImage(current + 1));

    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
      if (!images.length) return;
      if (e.key === "ArrowLeft") { stopPlay(); showImage(current - 1); }
      if (e.key === "ArrowRight") { stopPlay(); showImage(current + 1); }
      if (e.key === " ") { e.preventDefault(); playing ? stopPlay() : startPlay(); }
    });

    // ── Camera selection ─────────────────────────────────────────────────────────

    async function loadCamera(slug) {
      if (!slug) return;
      stopPlay();
      images = [];
      urlCache.clear();
      mainImage.style.display = "none";
      placeholder.textContent = "Loading…";
      placeholder.style.display = "block";
      prevBtn.disabled = nextBtn.disabled = playBtn.disabled = true;
      setStatus("Fetching image list…");

      try {
        let page = 1;
        let fetched = 0;
        images = [];
        let next = `${API_BASE}/cams/images/?camera=${encodeURIComponent(slug)}&page_size=500`;
        while (next) {
          const resp = await fetch(next);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          const results = data.results ?? data;
          images.push(...results);
          fetched += results.length;
          setStatus(`Loaded ${fetched} images…`);
          next = data.next ?? null;
        }

        if (!images.length) {
          placeholder.textContent = "No images found for this camera.";
          setStatus("");
          return;
        }

        images.sort((a, b) => a.datetime < b.datetime ? -1 : 1);

        const minDate = new Date(images[0].datetime);
        const maxDate = new Date(images[images.length - 1].datetime);

        initSlider(images.length, minDate, maxDate);

        // Configure date picker range
        datePicker.set("minDate", minDate);
        datePicker.set("maxDate", maxDate);

        playBtn.disabled = false;
        setStatus(`${images.length} images · ${minDate.getFullYear()}–${maxDate.getFullYear()}`);
        showImage(images.length - 1);
      } catch (err) {
        placeholder.textContent = `Error: ${err.message}`;
        placeholder.style.display = "block";
        setStatus("");
        console.error(err);
      }
    }

    cameraSelect.addEventListener("change", () => loadCamera(cameraSelect.value));

    // ── Init: load camera list ───────────────────────────────────────────────────

    (async () => {
      try {
        const cameras = await fetchAll(`${API_BASE}/cams/cameras/`);
        cameras.forEach((cam) => {
          const opt = document.createElement("option");
          opt.value = cam.slug;
          opt.textContent = cam.camera_name;
          cameraSelect.appendChild(opt);
        });
        if (!cameras.length) setStatus("No cameras configured.");
      } catch (err) {
        setStatus("Failed to load cameras.");
        console.error(err);
      }
    })();
  </script>
</body>

</html>
